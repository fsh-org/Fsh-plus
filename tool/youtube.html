<!DOCTYPE html>
<html lang="en">
  <head>
    <title>Youtube Downloader - Fsh</title>
    <meta property="og:title" content="Youtube Downloader - Fsh">
    <meta name="twitter:title" content="Youtube Downloader - Fsh">
    <meta name="description" content="Fsh Youtube video and audio downloader ad free and viewer.">
    <meta property="og:description" content="Fsh Youtube video and audio downloader ad free and viewer.">
    <meta name="twitter:description" content="Fsh Youtube video and audio downloader ad free and viewer.">
    <!-- ------- -->
    <meta charset="UTF-8">
    <meta name="robots" content="index, follow">
    <meta property="og:locale" content="en">
    <meta property="og:type" content="website">
    <meta name="twitter:card" content="summary">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="https://fsh.plus/fsh.png" type="image/png">
    <meta property="og:image" content="https://fsh.plus/fsh.png">
    <meta property="og:image:alt" content="Fsh logo">
    <meta name="twitter:image" content="https://fsh.plus/fsh.png">
    <meta name="theme-color" content="#a89c9b">
    <!-- ------- -->
    <link rel="stylesheet" href="https://fsh.plus/media/style.css">
    <script src="https://account.fsh.plus/script.js"></script>
    <!-- ------------------ -->
    <style>
      body {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        height: 100dvh;
        width: 100dvw;
        overflow: hidden;
      }
      #list span {
        display: flex;
        gap: 5px;
        align-items: center;
        justify-content: space-between;
      }
    </style>
  </head>
  <body>
    <h1>Youtube Downloader</h1>
    <div>
      <label for="id">ID:</label>
      <input id="id" placeholder="Youtube ID/URL here">
    </div>
    <div>
      <button onclick="dow('video')">Video (Mp4)</button>
      <button onclick="dow('audio')">Audio (Mp3)</button>
    </div>
    <div id="list"></div>
    <script>
      async function dow(type) {
        let id = document.getElementById('id').value;
        id = id
          .split('v=').slice(-1)[0]
          .split('&')[0]
          .split('/').slice(-1)[0]
          .split('?')[0];

        document.getElementById('list').insertAdjacentHTML('afterbegin', `<span>${id}<div data-id="${id}">Loading...</div></span>`);

        fetch(`https://api.fsh.plus/${type}?id=${id}`)
          .then(res=>res.json())
          .then(res=>{
            document.querySelector('div[data-id="'+id+'"]').innerHTML = res.err?'Error':`<a href="${res[type]}" target="_blank"><button>View</button></a><a href="${res.download}" target="_blank"><button>Download</button></a>`;
          })
          .catch(err=>{
            document.querySelector('div[data-id="'+id+'"]').innerText = 'Error';
          });
      }
    </script>
  </body>
</html>
